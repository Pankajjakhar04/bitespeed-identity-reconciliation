services:
  - type: web
    name: bitespeed-identity-reconciliation
    runtime: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

databases:
  - name: bitespeed-db
    databaseName: bitespeed
    user: bitespeed
    plan: free
